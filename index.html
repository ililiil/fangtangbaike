<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4F6EF7">
  <title>方塘百科 - 智能问答</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-content">
        <div class="header-icon">📚</div>
        <h1 class="header-title">方塘百科</h1>
        <span class="header-subtitle">智能问答助手</span>
      </div>
    </header>

    <main class="chat-area" id="chatArea">
      <div class="welcome-message" id="welcomeMessage">
        <div class="welcome-icon">🤖</div>
        <h2>你好，我是方塘百科智能助手</h2>
        <p>我可以根据知识库内容回答您的问题，请输入您想了解的内容</p>
      </div>
      <div class="messages" id="messages"></div>
    </main>

    <div class="image-preview-bar" id="imagePreviewBar" style="display:none;">
      <div class="image-preview-item" id="imagePreviewItem">
        <img id="imagePreviewImg" src="" alt="preview">
        <button class="image-preview-remove" id="imagePreviewRemove" title="移除图片">✕</button>
      </div>
    </div>

    <footer class="input-area">
      <div class="input-container">
        <button class="btn-icon" id="btnUpload" title="上传图片">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        </button>
        <input type="file" id="fileInput" accept="image/*" hidden>
        <textarea id="userInput" rows="1" placeholder="输入您的问题..." autofocus></textarea>
        <button class="btn-send" id="btnSend" disabled title="发送">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
        </button>
      </div>
    </footer>
  </div>

  <div class="image-overlay" id="imageOverlay">
    <img id="overlayImage" src="" alt="full image">
  </div>

  <div class="sources-panel" id="sourcesPanel">
    <div class="sources-panel-overlay" id="sourcesPanelOverlay"></div>
    <div class="sources-panel-content">
      <div class="sources-panel-header">
        <span class="sources-panel-title">检索结果</span>
        <button class="sources-panel-close" id="sourcesPanelClose">✕</button>
      </div>
      <div class="sources-panel-list" id="sourcesPanelList"></div>
      <div class="sources-panel-detail" id="sourcesPanelDetail" style="display:none;">
        <button class="sources-detail-back" id="sourcesDetailBack">← 返回列表</button>
        <div class="sources-detail-body" id="sourcesDetailBody"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
